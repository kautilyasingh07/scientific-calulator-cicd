---
- name: Deploy Calculator App
  hosts: servers
  become: yes
  become_method: sudo   # Explicitly use sudo
  become_user: root     # Run tasks as root

  tasks:

      - name: Pull latest Docker image
        docker_image:
            name: kautilyasingh/calculator-app
            tag: latest
            source: pull

      - name: Run calculator container
        docker_container:
            name: calculator-app
            image: kautilyasingh/calculator-app:latest
            state: started
            recreate: yes
            published_ports:
              - "8081:8080"
